services:
  - type: web
    name: tea-shop-agent
    env: docker
    plan: free
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false # User will input this in the Render dashboard
      - key: GROQ_API_KEY
        sync: false # User will input this in the Render dashboard
      - key: GOOGLE_SHEETS_CREDENTIALS_FILE
        value: /etc/secrets/tea-501906-c4089503eb33.json
      - key: GOOGLE_SHEET_NAME
        value: TeaShopAccounts
    secretFiles:
      - name: tea-501906-c4089503eb33.json
